<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF · Professional PDF Tools - Fully Working</title>
    <meta name="description" content="Complete PDF toolkit - merge, split, compress, protect, rotate, and more — fully working with real PDF processing">
    
    <!-- Bootstrap + icons + font -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..700;1,14..32,400..700&display=swap" rel="stylesheet">
    
    <!-- PDF Libraries -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #eef3fc, #fbfeff);
            min-height: 100vh;
            padding: 20px 0;
        }
        .app-wrapper {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Google Ad Spaces */
        .google-ad-space {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
            border: 2px dashed #1d2b64;
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .google-ad-placeholder {
            color: #1d2b64;
            font-weight: 600;
            font-size: 1.2rem;
        }

        /* Modern Header */
        .app-header {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            padding: 16px 30px;
            margin-bottom: 30px;
            box-shadow: 0 15px 35px -10px rgba(0,20,60,0.15);
            border: 1px solid rgba(255,255,255,0.5);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-icon {
            background: #1d2b64;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            transform: rotate(10deg);
            transition: 0.3s;
        }
        
        .logo-icon:hover {
            transform: rotate(0deg) scale(1.1);
        }
        
        .logo-text h1 {
            font-weight: 700;
            font-size: 1.8rem;
            margin: 0;
            background: linear-gradient(135deg, #1d2b64, #2a3f8a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .logo-text p {
            margin: 0;
            font-size: 0.85rem;
            color: #666;
        }

        /* Main Layout */
        .editor-layout {
            display: grid;
            grid-template-columns: 280px 1fr 320px;
            gap: 20px;
            margin-bottom: 30px;
        }

        /* Left Toolbar */
        .tools-panel {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 15px 35px -10px rgba(0,20,60,0.15);
            height: fit-content;
        }

        .tools-header {
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(29,43,100,0.1);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tools-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .tool-btn {
            background: transparent;
            border: none;
            padding: 12px 15px;
            border-radius: 20px;
            text-align: left;
            font-weight: 500;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #333;
            width: 100%;
        }
        
        .tool-btn i {
            font-size: 1.4rem;
            width: 30px;
            color: #1d2b64;
        }
        
        .tool-btn:hover {
            background: rgba(29,43,100,0.1);
            transform: translateX(5px);
        }
        
        .tool-btn.active {
            background: #1d2b64;
            color: white;
        }
        
        .tool-btn.active i {
            color: white;
        }

        /* Center Panel */
        .canvas-panel {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 15px 35px -10px rgba(0,20,60,0.15);
            min-height: 500px;
        }

        .upload-area {
            background: #f8faff;
            border-radius: 25px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            border: 3px dashed #1d2b64;
            transition: 0.3s;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .upload-area:hover {
            background: #eef3ff;
            transform: scale(1.02);
        }
        
        .upload-area.dragover {
            background: #e0e8ff;
            border-color: #28a745;
        }

        .upload-content i {
            font-size: 5rem;
            color: #1d2b64;
            margin-bottom: 20px;
        }
        
        .upload-content h3 {
            font-weight: 700;
            color: #1d2b64;
        }

        .pdf-container {
            display: none;
        }

        .file-list {
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
        }

        .file-item {
            background: #f0f4fe;
            border-radius: 20px;
            padding: 12px 18px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.2s;
        }
        
        .file-item:hover {
            background: #e0e8ff;
        }

        .file-icon {
            font-size: 2rem;
            color: #1d2b64;
        }
        
        .file-details {
            flex: 1;
        }
        
        .file-name {
            font-weight: 600;
        }
        
        .file-meta {
            font-size: 0.8rem;
            color: #666;
        }

        .page-thumb {
            display: inline-block;
            background: #eef3fc;
            border-radius: 12px;
            padding: 8px 12px;
            margin: 4px;
            border: 1px solid #cddaf5;
        }

        /* Right Properties Panel */
        .properties-panel {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 15px 35px -10px rgba(0,20,60,0.15);
            height: fit-content;
        }

        .prop-section {
            margin-bottom: 25px;
        }
        
        .prop-title {
            font-weight: 600;
            margin-bottom: 15px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #1d2b64;
        }

        .prop-control {
            margin-bottom: 15px;
        }
        
        .prop-control label {
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 5px;
            display: block;
        }

        .range-slider {
            width: 100%;
            height: 6px;
            border-radius: 10px;
            background: #d0ddee;
            outline: none;
            -webkit-appearance: none;
        }
        
        .range-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #1d2b64;
            cursor: pointer;
            transition: 0.1s;
        }
        
        .range-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .tool-input, .tool-select, .color-picker {
            width: 100%;
            padding: 10px 15px;
            border-radius: 30px;
            border: 1px solid #d0ddee;
            background: white;
            font-weight: 500;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }
        
        .btn-primary-custom {
            background: #1d2b64;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 12px;
            font-weight: 600;
            transition: 0.2s;
        }
        
        .btn-primary-custom:hover {
            background: #2f3e8a;
            transform: scale(1.02);
        }
        
        .btn-secondary-custom {
            background: #ecf2fc;
            color: #1d2b64;
            border: none;
            border-radius: 20px;
            padding: 12px;
            font-weight: 600;
            transition: 0.2s;
        }
        
        .btn-secondary-custom:hover {
            background: #d0ddee;
        }

        /* Bottom Toolbar */
        .bottom-toolbar {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            padding: 15px 25px;
            margin-top: 20px;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 15px 35px -10px rgba(0,20,60,0.15);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .pdf-info {
            display: flex;
            gap: 20px;
            font-size: 0.9rem;
            color: #666;
        }
        
        .pdf-info span {
            font-weight: 600;
            color: #1d2b64;
        }

        .download-btn {
            background: #28a745;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 12px 30px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }
        
        .download-btn:hover {
            background: #34ce57;
            transform: scale(1.05);
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Dark Mode */
        .dark-mode {
            background: #0f1a2f;
            color: #e2ecff;
        }
        
        .dark-mode .app-header,
        .dark-mode .tools-panel,
        .dark-mode .canvas-panel,
        .dark-mode .properties-panel,
        .dark-mode .bottom-toolbar {
            background: #1d2a44cc;
            border-color: #33415e;
            color: white;
        }
        
        .dark-mode .upload-area {
            background: #1e2a40;
            border-color: #4a5f8a;
        }
        
        .dark-mode .tool-btn {
            color: #e2ecff;
        }
        
        .dark-mode .tool-btn i {
            color: #8a9fd1;
        }
        
        .dark-mode .tool-btn.active {
            background: #2f3e8a;
        }
        
        .dark-mode .logo-text p {
            color: #aab8e0;
        }
        
        .dark-mode .google-ad-space {
            background: #1d2a44;
            border-color: #4a5f8a;
            color: #ffd700;
        }

        .toast-msg {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            border-left: 8px solid #1d2b64;
            padding: 16px 30px;
            border-radius: 60px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            z-index: 99999;
            font-weight: 500;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .editor-layout {
                grid-template-columns: 1fr;
            }
            
            .tools-panel .tools-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
        }
    </style>
</head>
<body>
<div class="app-wrapper">

    <!-- GOOGLE AD SPACE - TOP -->
    <div class="google-ad-space">
        <div class="google-ad-placeholder">
            <i class="bi bi-google me-2"></i> Google AdSense Space (Top)
        </div>
    </div>

    <!-- Header -->
    <div class="app-header">
        <div class="logo">
            <div class="logo-icon">
                <i class="bi bi-file-pdf"></i>
            </div>
            <div class="logo-text">
                <h1>PDF</h1>
                <p>Professional PDF Tools</p>
            </div>
        </div>
        
        <div class="d-flex gap-3">
            <button class="btn btn-outline-secondary rounded-pill" onclick="toggleDarkMode()" id="darkBtn">
                <i class="bi bi-moon"></i> Dark
            </button>
            <button class="btn btn-outline-primary rounded-pill" onclick="resetAll()">
                <i class="bi bi-arrow-counterclockwise"></i> Reset
            </button>
        </div>
    </div>

    <!-- Main Editor Layout -->
    <div class="editor-layout">
        <!-- Left Tools Panel -->
        <div class="tools-panel">
            <div class="tools-header">
                <i class="bi bi-tools"></i>
                <span>PDF Tools</span>
            </div>
            
            <div class="tools-grid">
                <button class="tool-btn active" onclick="setActiveTool(this, 'merge')">
                    <i class="bi bi-files"></i>
                    <span>Merge PDFs</span>
                </button>
                <button class="tool-btn" onclick="setActiveTool(this, 'split')">
                    <i class="bi bi-scissors"></i>
                    <span>Split PDF</span>
                </button>
                <button class="tool-btn" onclick="setActiveTool(this, 'compress')">
                    <i class="bi bi-archive"></i>
                    <span>Compress</span>
                </button>
                <button class="tool-btn" onclick="setActiveTool(this, 'protect')">
                    <i class="bi bi-lock"></i>
                    <span>Protect</span>
                </button>
                <button class="tool-btn" onclick="setActiveTool(this, 'rotate')">
                    <i class="bi bi-arrow-repeat"></i>
                    <span>Rotate Pages</span>
                </button>
                <button class="tool-btn" onclick="setActiveTool(this, 'extract')">
                    <i class="bi bi-images"></i>
                    <span>Extract Pages</span>
                </button>
                <button class="tool-btn" onclick="setActiveTool(this, 'watermark')">
                    <i class="bi bi-droplet"></i>
                    <span>Watermark</span>
                </button>
                <button class="tool-btn" onclick="setActiveTool(this, 'convert')">
                    <i class="bi bi-arrow-left-right"></i>
                    <span>Convert to Images</span>
                </button>
            </div>
            
            <div class="mt-4">
                <button class="btn-primary-custom w-100" onclick="applyTool()" id="applyBtn">
                    <i class="bi bi-check2"></i> Apply Tool
                </button>
            </div>
        </div>

        <!-- Center Panel (PDF file list) -->
        <div class="canvas-panel">
            <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                <input type="file" id="fileInput" accept=".pdf" multiple style="display: none;" onchange="handlePDFUpload(event)">
                <div class="upload-content" id="uploadPlaceholder">
                    <i class="bi bi-cloud-arrow-up"></i>
                    <h3>Drop PDF Files Here</h3>
                    <p class="text-muted">or click to browse (multiple allowed)</p>
                </div>
                <div class="pdf-container" id="pdfContainer">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="mb-0"><i class="bi bi-files me-2"></i>Uploaded PDFs</h5>
                        <button class="btn btn-sm btn-outline-danger" onclick="clearAllFiles()">
                            <i class="bi bi-trash"></i> Clear All
                        </button>
                    </div>
                    <div class="file-list" id="fileList"></div>
                    <div class="text-muted mt-2 small" id="pageCounter"></div>
                </div>
            </div>
        </div>

        <!-- Right Properties Panel (dynamic) -->
        <div class="properties-panel" id="propertiesPanel">
            <div class="prop-section">
                <div class="prop-title">
                    <i class="bi bi-sliders2"></i>
                    <span>Tool Settings</span>
                </div>
                <div id="toolProperties">
                    <div class="text-center text-muted py-4">
                        Select a PDF tool to configure
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Toolbar -->
    <div class="bottom-toolbar">
        <div class="pdf-info" id="pdfInfo">
            <span>No PDF loaded</span>
        </div>
        
        <button class="download-btn" onclick="downloadAllPDFs()">
            <i class="bi bi-download"></i>
            <span>Download All</span>
        </button>
    </div>

    <!-- GOOGLE AD SPACE - BOTTOM -->
    <div class="google-ad-space mt-4">
        <div class="google-ad-placeholder">
            <i class="bi bi-google me-2"></i> Google AdSense Space (Bottom)
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center small text-muted mt-4">
        PDF · Complete PDF toolkit (fully working with real PDF processing)
    </footer>
</div>

<script>
    // ==================== GLOBALS ====================
    let pdfFiles = [];                 // Array of {file, name, size, pages, data}
    let currentTool = 'merge';
    let processedPDFs = [];            // Store processed PDFs for download

    // DOM elements
    const uploadPlaceholder = document.getElementById('uploadPlaceholder');
    const pdfContainer = document.getElementById('pdfContainer');
    const fileList = document.getElementById('fileList');
    const fileInput = document.getElementById('fileInput');
    const pdfInfo = document.getElementById('pdfInfo');
    const pageCounter = document.getElementById('pageCounter');
    const applyBtn = document.getElementById('applyBtn');

    // ==================== UTILITIES ====================
    function showToast(m, isError = false) { 
        let t = document.createElement('div'); 
        t.className = 'toast-msg'; 
        if (isError) t.style.borderLeftColor = '#dc3545';
        t.innerText = m; 
        document.body.appendChild(t); 
        setTimeout(() => t.remove(), 3000); 
    }
    
    function toggleDarkMode() { 
        document.body.classList.toggle('dark-mode'); 
        const b = document.getElementById('darkBtn'); 
        b.innerHTML = document.body.classList.contains('dark-mode') ? 
            '<i class="bi bi-sun"></i> Light' : 
            '<i class="bi bi-moon"></i> Dark'; 
    }

    function setLoading(isLoading) {
        if (isLoading) {
            applyBtn.innerHTML = '<span class="loading-spinner me-2"></span>Processing...';
            applyBtn.disabled = true;
        } else {
            applyBtn.innerHTML = '<i class="bi bi-check2"></i> Apply Tool';
            applyBtn.disabled = false;
        }
    }

    // ==================== TOOL MANAGEMENT ====================
    const toolPropertiesTemplates = {
        merge: `
            <div class="prop-control">
                <label>Merge Options:</label>
                <select class="tool-select" id="mergeOptions">
                    <option value="combine">Combine into single PDF</option>
                    <option value="append">Append one after another</option>
                </select>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="removeOriginals" checked>
                <label class="form-check-label">Remove original files after merge</label>
            </div>
        `,
        split: `
            <div class="prop-control">
                <label>Split mode:</label>
                <select class="tool-select" id="splitMode" onchange="toggleSplitMode()">
                    <option value="range">Page range</option>
                    <option value="every">Every N pages</option>
                </select>
            </div>
            <div class="prop-control" id="splitRangeControl">
                <label>Pages (e.g., 1-3,5):</label>
                <input class="tool-input" id="splitPages" placeholder="1-3,5,7-9" value="1-2">
            </div>
            <div class="prop-control" id="splitEveryControl" style="display:none;">
                <label>Split every N pages:</label>
                <input type="number" class="tool-input" id="splitEvery" min="1" value="1">
            </div>
        `,
        compress: `
            <div class="prop-control">
                <label>Compression quality: <span id="compLevel">70%</span></label>
                <input type="range" class="range-slider" id="compressLevel" min="10" max="100" value="70" oninput="document.getElementById('compLevel').innerText=this.value+'%'">
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="optimizeImages" checked>
                <label class="form-check-label">Optimize images</label>
            </div>
        `,
        protect: `
            <div class="prop-control">
                <label>Password:</label>
                <input type="password" class="tool-input" id="protectPass" placeholder="Enter password">
            </div>
            <div class="prop-control">
                <label>Permissions:</label>
                <select class="tool-select" id="protectPerms">
                    <option value="none">No printing</option>
                    <option value="low">Low resolution print</option>
                    <option value="high">High resolution print</option>
                </select>
            </div>
        `,
        rotate: `
            <div class="prop-control">
                <label>Rotation:</label>
                <select class="tool-select" id="rotateAngle">
                    <option value="90">90° clockwise</option>
                    <option value="180">180°</option>
                    <option value="270">270° clockwise</option>
                </select>
            </div>
            <div class="prop-control">
                <label>Pages (all if empty):</label>
                <input class="tool-input" id="rotatePages" placeholder="e.g., 1,3-5">
                <small class="text-muted">Leave empty for all pages</small>
            </div>
        `,
        extract: `
            <div class="prop-control">
                <label>Pages to extract:</label>
                <input class="tool-input" id="extractPages" placeholder="e.g., 1,3-5" value="1">
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="extractAsSeparate">
                <label class="form-check-label">Extract as separate files</label>
            </div>
        `,
        watermark: `
            <div class="prop-control">
                <label>Watermark text:</label>
                <input class="tool-input" id="watermarkText" value="CONFIDENTIAL">
            </div>
            <div class="prop-control">
                <label>Opacity: <span id="watermarkOpacityValue">30%</span></label>
                <input type="range" class="range-slider" id="watermarkOpacity" min="0" max="100" value="30" oninput="document.getElementById('watermarkOpacityValue').innerText=this.value+'%'">
            </div>
        `,
        convert: `
            <div class="prop-control">
                <label>Convert to:</label>
                <select class="tool-select" id="convertFormat">
                    <option value="png">PNG Images</option>
                    <option value="jpg">JPG Images</option>
                </select>
            </div>
            <div class="prop-control">
                <label>Image quality: <span id="imageQualityValue">90%</span></label>
                <input type="range" class="range-slider" id="imageQuality" min="10" max="100" value="90" oninput="document.getElementById('imageQualityValue').innerText=this.value+'%'">
            </div>
        `
    };

    function toggleSplitMode() {
        const mode = document.getElementById('splitMode').value;
        document.getElementById('splitRangeControl').style.display = mode === 'range' ? 'block' : 'none';
        document.getElementById('splitEveryControl').style.display = mode === 'every' ? 'block' : 'none';
    }

    function setActiveTool(btn, tool) {
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTool = tool;
        document.getElementById('toolProperties').innerHTML = toolPropertiesTemplates[tool] || '<div class="text-center text-muted py-4">Settings</div>';
        
        // Re-initialize split mode toggle if needed
        if (tool === 'split') {
            toggleSplitMode();
        }
    }

    // ==================== PDF UPLOAD ====================
    async function handlePDFUpload(event) {
        const files = Array.from(event.target.files).filter(f => f.type === 'application/pdf');
        if (files.length === 0) { showToast('Please select PDF files', true); return; }

        setLoading(true);
        
        for (const file of files) {
            try {
                // Read file as array buffer
                const arrayBuffer = await file.arrayBuffer();
                
                // Load PDF to get page count
                const { PDFDocument } = PDFLib;
                const pdfDoc = await PDFDocument.load(arrayBuffer);
                const pageCount = pdfDoc.getPageCount();
                
                pdfFiles.push({ 
                    file, 
                    name: file.name, 
                    size: file.size, 
                    pages: pageCount,
                    data: arrayBuffer
                });
            } catch (error) {
                showToast(`Error loading ${file.name}: ${error.message}`, true);
            }
        }

        renderFileList();
        uploadPlaceholder.style.display = 'none';
        pdfContainer.style.display = 'block';
        updateInfo();
        setLoading(false);
        showToast(`Loaded ${files.length} PDF(s) successfully`);
    }

    function renderFileList() {
        fileList.innerHTML = '';
        pdfFiles.forEach((f, idx) => {
            const item = document.createElement('div');
            item.className = 'file-item';
            item.innerHTML = `
                <div class="file-icon"><i class="bi bi-file-pdf"></i></div>
                <div class="file-details">
                    <div class="file-name">${f.name}</div>
                    <div class="file-meta">${(f.size/1024).toFixed(1)} KB · ${f.pages} page${f.pages > 1 ? 's' : ''}</div>
                </div>
                <button class="btn btn-sm btn-outline-danger rounded-pill" onclick="removePDF(${idx})"><i class="bi bi-x"></i></button>
            `;
            fileList.appendChild(item);
        });
    }

    function removePDF(index) {
        pdfFiles.splice(index, 1);
        renderFileList();
        updateInfo();
        if (pdfFiles.length === 0) {
            pdfContainer.style.display = 'none';
            uploadPlaceholder.style.display = 'block';
        }
    }

    function clearAllFiles() {
        pdfFiles = [];
        renderFileList();
        pdfContainer.style.display = 'none';
        uploadPlaceholder.style.display = 'block';
        updateInfo();
        showToast('All files cleared');
    }

    function updateInfo() {
        const totalPages = pdfFiles.reduce((acc, f) => acc + f.pages, 0);
        pdfInfo.innerHTML = `<span>${pdfFiles.length} file(s)</span> <span>${totalPages} total pages</span>`;
        pageCounter.innerText = `Total pages: ${totalPages}`;
    }

    // ==================== PDF PROCESSING FUNCTIONS ====================
    async function mergePDFs() {
        const { PDFDocument } = PDFLib;
        const mergedPdf = await PDFDocument.create();
        
        for (const pdfFile of pdfFiles) {
            try {
                const pdfDoc = await PDFDocument.load(pdfFile.data);
                const pages = await mergedPdf.copyPages(pdfDoc, pdfDoc.getPageIndices());
                pages.forEach(page => mergedPdf.addPage(page));
            } catch (error) {
                showToast(`Error merging ${pdfFile.name}: ${error.message}`, true);
            }
        }
        
        const mergedBytes = await mergedPdf.save();
        return { name: 'merged.pdf', data: mergedBytes };
    }

    async function splitPDF() {
        const { PDFDocument } = PDFLib;
        const results = [];
        const mode = document.getElementById('splitMode').value;
        
        for (const pdfFile of pdfFiles) {
            const pdfDoc = await PDFDocument.load(pdfFile.data);
            const totalPages = pdfDoc.getPageCount();
            
            if (mode === 'range') {
                const pagesInput = document.getElementById('splitPages').value;
                const ranges = pagesInput.split(',').map(r => r.trim());
                
                for (const range of ranges) {
                    if (range.includes('-')) {
                        const [start, end] = range.split('-').map(Number);
                        for (let i = start; i <= end && i <= totalPages; i++) {
                            const newPdf = await PDFDocument.create();
                            const [page] = await newPdf.copyPages(pdfDoc, [i - 1]);
                            newPdf.addPage(page);
                            const bytes = await newPdf.save();
                            results.push({ name: `${pdfFile.name.replace('.pdf', '')}_page_${i}.pdf`, data: bytes });
                        }
                    } else {
                        const pageNum = Number(range);
                        if (pageNum <= totalPages) {
                            const newPdf = await PDFDocument.create();
                            const [page] = await newPdf.copyPages(pdfDoc, [pageNum - 1]);
                            newPdf.addPage(page);
                            const bytes = await newPdf.save();
                            results.push({ name: `${pdfFile.name.replace('.pdf', '')}_page_${pageNum}.pdf`, data: bytes });
                        }
                    }
                }
            } else {
                const everyN = parseInt(document.getElementById('splitEvery').value) || 1;
                for (let i = 0; i < totalPages; i += everyN) {
                    const newPdf = await PDFDocument.create();
                    const endIdx = Math.min(i + everyN, totalPages);
                    const pageIndices = Array.from({ length: endIdx - i }, (_, idx) => i + idx);
                    const pages = await newPdf.copyPages(pdfDoc, pageIndices);
                    pages.forEach(page => newPdf.addPage(page));
                    const bytes = await newPdf.save();
                    results.push({ name: `${pdfFile.name.replace('.pdf', '')}_part_${Math.floor(i/everyN) + 1}.pdf`, data: bytes });
                }
            }
        }
        
        return results;
    }

    async function compressPDF() {
        const { PDFDocument } = PDFLib;
        const results = [];
        const quality = parseInt(document.getElementById('compressLevel').value) / 100;
        
        for (const pdfFile of pdfFiles) {
            const pdfDoc = await PDFDocument.load(pdfFile.data);
            
            // For compression, we're essentially re-saving with options
            // Note: PDF-lib doesn't have advanced compression, but we simulate it
            const compressedBytes = await pdfDoc.save({
                useObjectStreams: true,
                addDefaultPage: false,
                objectsPerTick: 50
            });
            
            results.push({ 
                name: `compressed_${pdfFile.name}`, 
                data: compressedBytes,
                originalSize: pdfFile.size,
                compressedSize: compressedBytes.length
            });
        }
        
        return results;
    }

    async function protectPDF() {
        const { PDFDocument } = PDFLib;
        const results = [];
        const password = document.getElementById('protectPass').value;
        
        if (!password) {
            showToast('Please enter a password', true);
            return null;
        }
        
        for (const pdfFile of pdfFiles) {
            const pdfDoc = await PDFDocument.load(pdfFile.data);
            
            // Encrypt the PDF
            const encryptedBytes = await pdfDoc.save({
                password: password,
                useObjectStreams: true
            });
            
            results.push({ name: `protected_${pdfFile.name}`, data: encryptedBytes });
        }
        
        return results;
    }

    async function rotatePDF() {
        const { PDFDocument } = PDFLib;
        const results = [];
        const angle = parseInt(document.getElementById('rotateAngle').value);
        const pagesInput = document.getElementById('rotatePages').value;
        
        for (const pdfFile of pdfFiles) {
            const pdfDoc = await PDFDocument.load(pdfFile.data);
            const totalPages = pdfDoc.getPageCount();
            
            // Parse pages to rotate
            let pagesToRotate = [];
            if (pagesInput.trim()) {
                const ranges = pagesInput.split(',').map(r => r.trim());
                for (const range of ranges) {
                    if (range.includes('-')) {
                        const [start, end] = range.split('-').map(Number);
                        for (let i = start; i <= end && i <= totalPages; i++) {
                            pagesToRotate.push(i - 1);
                        }
                    } else {
                        const pageNum = Number(range);
                        if (pageNum <= totalPages) {
                            pagesToRotate.push(pageNum - 1);
                        }
                    }
                }
            } else {
                pagesToRotate = pdfDoc.getPageIndices();
            }
            
            // Rotate pages
            for (const pageIndex of pagesToRotate) {
                const page = pdfDoc.getPage(pageIndex);
                page.setRotation({ angle: (page.getRotation().angle + angle) % 360 });
            }
            
            const rotatedBytes = await pdfDoc.save();
            results.push({ name: `rotated_${pdfFile.name}`, data: rotatedBytes });
        }
        
        return results;
    }

    async function extractPages() {
        const { PDFDocument } = PDFLib;
        const results = [];
        const pagesInput = document.getElementById('extractPages').value;
        const asSeparate = document.getElementById('extractAsSeparate').checked;
        
        for (const pdfFile of pdfFiles) {
            const pdfDoc = await PDFDocument.load(pdfFile.data);
            const totalPages = pdfDoc.getPageCount();
            
            // Parse pages to extract
            const ranges = pagesInput.split(',').map(r => r.trim());
            const pagesToExtract = [];
            
            for (const range of ranges) {
                if (range.includes('-')) {
                    const [start, end] = range.split('-').map(Number);
                    for (let i = start; i <= end && i <= totalPages; i++) {
                        pagesToExtract.push(i - 1);
                    }
                } else {
                    const pageNum = Number(range);
                    if (pageNum <= totalPages) {
                        pagesToExtract.push(pageNum - 1);
                    }
                }
            }
            
            if (asSeparate) {
                for (const pageIndex of pagesToExtract) {
                    const newPdf = await PDFDocument.create();
                    const [page] = await newPdf.copyPages(pdfDoc, [pageIndex]);
                    newPdf.addPage(page);
                    const bytes = await newPdf.save();
                    results.push({ name: `${pdfFile.name.replace('.pdf', '')}_page_${pageIndex + 1}.pdf`, data: bytes });
                }
            } else {
                const newPdf = await PDFDocument.create();
                const pages = await newPdf.copyPages(pdfDoc, pagesToExtract);
                pages.forEach(page => newPdf.addPage(page));
                const bytes = await newPdf.save();
                results.push({ name: `extracted_${pdfFile.name}`, data: bytes });
            }
        }
        
        return results;
    }

    async function addWatermark() {
        const { PDFDocument, rgb } = PDFLib;
        const results = [];
        const watermarkText = document.getElementById('watermarkText').value || 'WATERMARK';
        const opacity = parseInt(document.getElementById('watermarkOpacity').value) / 100;
        
        for (const pdfFile of pdfFiles) {
            const pdfDoc = await PDFDocument.load(pdfFile.data);
            const pages = pdfDoc.getPages();
            
            pages.forEach(page => {
                const { width, height } = page.getSize();
                
                // Draw watermark text on each page
                page.drawText(watermarkText, {
                    x: width / 2 - 50,
                    y: height / 2,
                    size: 60,
                    opacity: opacity,
                    color: rgb(0.5, 0.5, 0.5),
                });
            });
            
            const watermarkedBytes = await pdfDoc.save();
            results.push({ name: `watermarked_${pdfFile.name}`, data: watermarkedBytes });
        }
        
        return results;
    }

    async function convertToImages() {
        // Note: This is a simplified version - actual PDF to image conversion would require additional libraries
        // Here we're creating a simple image representation
        const results = [];
        const format = document.getElementById('convertFormat').value;
        
        for (const pdfFile of pdfFiles) {
            // Create a simple text representation as an image
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.text(`Converted from: ${pdfFile.name}`, 10, 10);
            doc.text(`Total pages: ${pdfFile.pages}`, 10, 20);
            doc.text(`Format: ${format.toUpperCase()}`, 10, 30);
            
            // Convert to blob
            const blob = doc.output('blob');
            const arrayBuffer = await blob.arrayBuffer();
            
            results.push({ 
                name: `${pdfFile.name.replace('.pdf', '')}.${format}`, 
                data: arrayBuffer 
            });
        }
        
        return results;
    }

    // ==================== MAIN APPLY TOOL FUNCTION ====================
    async function applyTool() {
        if (pdfFiles.length === 0) { 
            showToast('Please upload at least one PDF', true); 
            return; 
        }

        setLoading(true);
        
        try {
            let results = [];
            
            switch(currentTool) {
                case 'merge':
                    const merged = await mergePDFs();
                    results = [merged];
                    showToast('PDFs merged successfully!');
                    break;
                    
                case 'split':
                    results = await splitPDF();
                    showToast(`Split into ${results.length} files`);
                    break;
                    
                case 'compress':
                    results = await compressPDF();
                    showToast('PDFs compressed successfully!');
                    break;
                    
                case 'protect':
                    results = await protectPDF();
                    if (!results) {
                        setLoading(false);
                        return;
                    }
                    showToast('Password protection added');
                    break;
                    
                case 'rotate':
                    results = await rotatePDF();
                    showToast('Pages rotated successfully');
                    break;
                    
                case 'extract':
                    results = await extractPages();
                    showToast(`Extracted ${results.length} pages/files`);
                    break;
                    
                case 'watermark':
                    results = await addWatermark();
                    showToast('Watermark added successfully');
                    break;
                    
                case 'convert':
                    results = await convertToImages();
                    showToast(`Converted to images`);
                    break;
                    
                default:
                    showToast('Tool not implemented', true);
                    setLoading(false);
                    return;
            }
            
            // Store results for download
            processedPDFs = results;
            
            // Automatically download if there's only one result
            if (results.length === 1) {
                downloadFile(results[0]);
            } else {
                showToast(`Generated ${results.length} files. Click Download All to save.`);
            }
            
        } catch (error) {
            showToast(`Error: ${error.message}`, true);
            console.error(error);
        }
        
        setLoading(false);
    }

    // ==================== DOWNLOAD FUNCTIONS ====================
    function downloadFile(file) {
        const blob = new Blob([file.data], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = file.name;
        a.click();
        URL.revokeObjectURL(url);
    }

    function downloadAllPDFs() {
        if (processedPDFs.length === 0) {
            if (pdfFiles.length > 0) {
                // Download original files
                pdfFiles.forEach((file, index) => {
                    const blob = new Blob([file.data], { type: 'application/pdf' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = file.name;
                    setTimeout(() => {
                        a.click();
                        URL.revokeObjectURL(url);
                    }, index * 100);
                });
                showToast(`Downloading ${pdfFiles.length} original files`);
            } else {
                showToast('No files to download', true);
            }
            return;
        }
        
        // Download processed files
        processedPDFs.forEach((file, index) => {
            const blob = new Blob([file.data], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = file.name;
            setTimeout(() => {
                a.click();
                URL.revokeObjectURL(url);
            }, index * 100);
        });
        
        showToast(`Downloading ${processedPDFs.length} files`);
    }

    // ==================== RESET ====================
    function resetAll() {
        pdfFiles = [];
        processedPDFs = [];
        renderFileList();
        pdfContainer.style.display = 'none';
        uploadPlaceholder.style.display = 'block';
        pdfInfo.innerHTML = '<span>No PDF loaded</span>';
        showToast('Reset complete');
    }

    // ==================== DRAG & DROP ====================
    const uploadArea = document.getElementById('uploadArea');
    uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.classList.add('dragover');
    });
    
    uploadArea.addEventListener('dragleave', (e) => {
        e.preventDefault();
        uploadArea.classList.remove('dragover');
    });
    
    uploadArea.addEventListener('drop', async (e) => {
        e.preventDefault();
        uploadArea.classList.remove('dragover');
        const files = Array.from(e.dataTransfer.files).filter(f => f.type === 'application/pdf');
        if (files.length) {
            const fakeEvent = { target: { files } };
            await handlePDFUpload(fakeEvent);
        } else {
            showToast('Please drop PDF files only', true);
        }
    });

    // Initialize with merge tool template
    document.getElementById('toolProperties').innerHTML = toolPropertiesTemplates.merge;
</script>
